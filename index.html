<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh My Skills</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }

      .preload-shell {
        display: flex;
        height: 100%;
        flex-direction: column;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(246, 247, 248, 0.26)),
          rgba(235, 237, 238, 0.28);
        color: #17191c;
      }

      .preload-nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 70px;
        padding: 16px 24px 10px;
      }

      .preload-logo {
        grid-column: 1;
        font-weight: 700;
        font-size: 13px;
        color: #17191c;
        opacity: 0.85;
      }

      .preload-tabs {
        display: inline-flex;
        grid-column: 2;
        justify-self: center;
        gap: 3px;
        padding: 4px;
        border: 1px solid rgba(24, 26, 29, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 16px 48px rgba(22, 24, 26, 0.08);
      }

      .preload-tabs span {
        display: inline-flex;
        min-width: 106px;
        min-height: 34px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: rgba(23, 25, 28, 0.66);
        font-size: 14px;
        font-weight: 800;
      }

      .preload-tabs span:first-child {
        background: #2f3338;
        color: #f9fafb;
      }

      .preload-content {
        display: grid;
        flex: 1;
        place-items: center;
        padding-bottom: 8vh;
        color: rgba(23, 25, 28, 0.50);
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="preload-shell">
        <header class="preload-nav">
          <div class="preload-logo">Oh My Skills</div>
          <nav class="preload-tabs" aria-label="主导航">
            <span>发现 Agent</span>
            <span>发现 Skills</span>
            <span>同步 Skills</span>
          </nav>
        </header>
        <section class="preload-content">正在加载 Oh My Skills...</section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
