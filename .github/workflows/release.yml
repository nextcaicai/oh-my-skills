name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to build from
        required: false
        default: main

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target aarch64-apple-darwin
            build_command: tauri:build:macos
            artifact_name: oh-my-skills-dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            args: ""
            build_command: tauri:build:windows
            artifact_name: oh-my-skills-windows-nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*setup.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Oh My Skills ${{ github.ref_name }}"
          releaseBody: |
            ## Oh My Skills ${{ github.ref_name }}

            ### Downloads
            - macOS (Apple Silicon): `Oh My Skills_*.dmg` in the assets below
            - Windows 10/11 (x64): `Oh My Skills_*_x64-setup.exe` in the assets below

            For installation instructions and changelog, see the [README](https://github.com/nextcaicai/oh-my-skills#readme).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build installers (manual)
        if: github.event_name == 'workflow_dispatch'
        run: npm run ${{ matrix.build_command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error